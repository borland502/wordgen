version: '3'

vars:
  APP_NAME: gsea
  BUILD_DIR: ./bin
  BUILD_TARGET: '{{.BUILD_DIR}}/{{.APP_NAME}}'
  GO_PACKAGES: ./...
  INSTALL_DIR:
    sh: |
      gobin="$(go env GOBIN)"
      if [ -n "$gobin" ]; then
        printf '%s' "$gobin"
      else
        gopath="$(go env GOPATH)"
        case "$(go env GOOS)" in
          windows)
            first_gopath="${gopath%%;*}"
            ;;
          *)
            first_gopath="${gopath%%:*}"
            ;;
        esac
        printf '%s/bin' "$first_gopath"
      fi
  INSTALL_TARGET: '{{.INSTALL_DIR}}/{{.APP_NAME}}'
  CONFIG_PATH:
    sh: |
      if [ -n "${XDG_CONFIG_HOME:-}" ]; then
        printf '%s/%s/config.toml' "$XDG_CONFIG_HOME" "{{.APP_NAME}}"
      else
        case "$(go env GOOS)" in
          darwin)
            printf '%s/Library/Application Support/%s/config.toml' "$HOME" "{{.APP_NAME}}"
            ;;
          windows)
            if [ -n "${LOCALAPPDATA:-}" ]; then
              printf '%s/%s/config.toml' "$LOCALAPPDATA" "{{.APP_NAME}}"
            else
              printf '%s/AppData/Local/%s/config.toml' "$HOME" "{{.APP_NAME}}"
            fi
            ;;
          *)
            printf '%s/.config/%s/config.toml' "$HOME" "{{.APP_NAME}}"
            ;;
        esac
      fi

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all
    silent: true

  fmt:
    desc: Format Go source files
    cmds:
      - find . -type f -name '*.go' -not -path './.direnv/*' -not -path './.tools/*' -not -path './bin/*' -print0 | xargs -0 gofmt -w

  fmt-check:
    desc: Fail if Go source files are not formatted
    cmds:
      - |
        unformatted="$(find . -type f -name '*.go' -not -path './.direnv/*' -not -path './.tools/*' -not -path './bin/*' -print0 | xargs -0 gofmt -l)"
        if [ -n "$unformatted" ]; then
          printf 'These files need gofmt:\n%s\n' "$unformatted" >&2
          exit 1
        fi

  tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  test:
    desc: Run the Go test suite
    cmds:
      - go test {{.GO_PACKAGES}}

  vet:
    desc: Run go vet
    cmds:
      - go vet {{.GO_PACKAGES}}

  check:
    desc: Run the common verification steps
    deps:
      - fmt-check
    cmds:
      - task: test
      - task: vet

  build:
    desc: Build the CLI into ./bin
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -o {{.BUILD_TARGET}} .
    sources:
      - cmd/**/*.go
      - main.go
      - go.mod
      - go.sum
    generates:
      - '{{.BUILD_TARGET}}'

  example:
    desc: Run the example subcommand, pass extra flags after --
    cmds:
      - go run . example {{.CLI_ARGS}}

  init-config:
    desc: Write a starter config file, pass --force or --config after --
    cmds:
      - go run . init-config {{.CLI_ARGS}}

  deploy:
    desc: Initialize config, build the CLI, and install the binary into GOBIN
    platforms: [linux, darwin]
    deps:
      - check
    cmds:
      - mkdir -p "$(dirname '{{.CONFIG_PATH}}')"
      - |
        if [ ! -f "{{.CONFIG_PATH}}" ]; then
          go run . init-config --config "{{.CONFIG_PATH}}"
          : > "{{.CONFIG_PATH}}.task-managed"
        else
          printf 'config already exists at %s\n' "{{.CONFIG_PATH}}"
        fi
      - task: build
      - mkdir -p "{{.INSTALL_DIR}}"
      - cp "{{.BUILD_TARGET}}" "{{.INSTALL_TARGET}}"
      - chmod +x "{{.INSTALL_TARGET}}"
      - printf 'installed %s\n' "{{.INSTALL_TARGET}}"

  undeploy:
    desc: Remove build outputs, the installed binary, and any config generated by deploy
    platforms: [linux, darwin]
    cmds:
      - task: clean
      - rm -f "{{.INSTALL_TARGET}}"
      - |
        if [ -f "{{.CONFIG_PATH}}.task-managed" ]; then
          rm -f "{{.CONFIG_PATH}}"
        fi
      - rm -f "{{.CONFIG_PATH}}.task-managed"
      - rmdir "$(dirname '{{.CONFIG_PATH}}')" 2>/dev/null || true
      - printf 'removed %s and %s\n' "{{.INSTALL_TARGET}}" "{{.CONFIG_PATH}}"

  clean:
    desc: Remove build outputs
    cmds:
      - rm -rf {{.BUILD_DIR}}
