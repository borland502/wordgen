project_name: wordgen

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: wordgen
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/borland502/wordgen/internal/version.Version={{.Version}}
      - -X github.com/borland502/wordgen/internal/version.Commit={{.Commit}}
      - -X github.com/borland502/wordgen/internal/version.Date={{.Date}}

checksum:
  name_template: checksums.txt

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - configs/wordgen.toml
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - configs/wordgen.toml

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Version}}"
  footer: |
    Maintained by Jeremy Hettenhouser <jhettenh@gmail.com>.
