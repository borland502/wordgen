name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./...

      - name: Create and push semantic tag
        shell: bash
        run: |
          set -euo pipefail

          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "HEAD already has a SemVer tag; skipping."
            exit 0
          fi

          latest_tag="$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1 || true)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
            range="HEAD"
          else
            range="${latest_tag}..HEAD"
          fi

          subjects="$(git log --format=%s ${range})"
          bodies="$(git log --format=%b ${range})"

          bump=""
          if echo "${subjects}" | grep -Eq '^[a-zA-Z]+\(.+\)!:|^[a-zA-Z]+!:' || echo "${bodies}" | grep -q 'BREAKING CHANGE'; then
            bump="major"
          elif echo "${subjects}" | grep -Eq '^feat(\(.+\))?:'; then
            bump="minor"
          elif echo "${subjects}" | grep -Eq '^(fix|perf)(\(.+\))?:'; then
            bump="patch"
          else
            echo "No releasable commits found (feat/fix/perf/BREAKING CHANGE); skipping tag."
            exit 0
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${version}"

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "Releasing ${next_tag} (${bump} bump from ${latest_tag})"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${next_tag}" -m "release: ${next_tag}"
          git push origin "${next_tag}"
